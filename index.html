            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border-light: rgba(255, 255, 255, 0.1);
            --glass-border-dark: rgba(255, 255, 255, 0.05);
            --glass-hover-bg: rgba(255, 255, 255, 0.1);
            --glass-hover-border: rgba(255, 255, 255, 0.2);
            --skill-hover-bg: rgba(255, 255, 255, 0.1);
            --ambient-opacity: 0.15;
        }
        .glass-panel {
            background-color: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-right: 1px solid var(--glass-border-dark);
            border-bottom: 1px solid var(--glass-border-dark);
        }
        .glass-panel-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel-hover:hover {
            background-color: var(--glass-hover-bg);
            border-color: var(--glass-hover-border);
            transform: scale(1.02);
            border-left-color: theme('colors.primary');
        }
        
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fade-in-quick {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .gradient-text {
            background: linear-gradient(to right, theme('colors.primary'), theme('colors.secondary'));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            position: relative;
        }

        .glitch-hover:hover {
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        /* Cyberpunk 2077 Sliced Glitch */
        .cyberpunk-glitch {
            position: relative;
            display: inline-block;
            transition: all 0.2s;
        }

        .cyberpunk-glitch::before,
        .cyberpunk-glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(to right, theme('colors.primary'), theme('colors.secondary'));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
        }

        .cyberpunk-glitch:hover {
            animation: text-smear 1.5s ease-out forwards;
        }

        .cyberpunk-glitch:hover::before {
            opacity: 1;
            animation: smear-slice-1 1.5s ease-out forwards;
        }

        .cyberpunk-glitch:hover::after {
            opacity: 1;
            animation: smear-slice-2 1.5s ease-out forwards;
        }

        @keyframes smear-slice-1 {
            0% { clip-path: inset(20% 0 78% 0); transform: translate(-50px, 0) scaleX(5); opacity: 0; }
            20% { clip-path: inset(60% 0 38% 0); transform: translate(100px, 0) scaleX(10); opacity: 1; }
            40% { clip-path: inset(40% 0 58% 0); transform: translate(-150px, 0) scaleX(15); opacity: 1; }
            60% { clip-path: inset(80% 0 18% 0); transform: translate(50px, 0) scaleX(5); opacity: 0.8; }
            80% { clip-path: inset(10% 0 88% 0); transform: translate(-20px, 0) scaleX(3); opacity: 0.5; }
            100% { clip-path: inset(0 0 0 0); transform: translate(0, 0) scaleX(1); opacity: 0; }
        }

        @keyframes smear-slice-2 {
            0% { clip-path: inset(10% 0 88% 0); transform: translate(50px, 0) scaleX(8); opacity: 0; }
            20% { clip-path: inset(30% 0 68% 0); transform: translate(-80px, 0) scaleX(12); opacity: 1; }
            40% { clip-path: inset(70% 0 28% 0); transform: translate(120px, 0) scaleX(8); opacity: 1; }
            60% { clip-path: inset(20% 0 78% 0); transform: translate(-50px, 0) scaleX(5); opacity: 0.8; }
            80% { clip-path: inset(50% 0 48% 0); transform: translate(20px, 0) scaleX(2); opacity: 0.5; }
            100% { clip-path: inset(0 0 0 0); transform: translate(0, 0) scaleX(1); opacity: 0; }
        }

        @keyframes text-smear {
            0% { transform: scaleX(1); filter: blur(0); opacity: 1; }
            20% { transform: scaleX(2) scaleY(0.8); filter: blur(4px); opacity: 0; }
            40% { transform: scaleX(1.5) scaleY(0.9); filter: blur(2px); opacity: 0.2; }
            60% { transform: scaleX(1.1); filter: blur(1px); opacity: 0.8; }
            100% { transform: scaleX(1); filter: blur(0); opacity: 1; }
        }

        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: var(--ambient-opacity);
            pointer-events: none;
            z-index: -1;
        }

        .hover-glow {
            transition: all 0.3s ease;
        }
        .hover-glow:hover {
            text-shadow: 0 0 12px theme('colors.primary'), 0 0 20px theme('colors.primary');
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: theme('colors.surface-container-lowest');
        }
        ::-webkit-scrollbar-thumb {
            background: theme('colors.primary');
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: theme('colors.secondary');
        }

        /* Skill Cards Dynamic Hover */
        .skill-card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .skill-card-hover:hover {
            background-color: var(--skill-hover-bg);
            border-color: var(--hover-color, theme('colors.primary'));
            box-shadow: 0 0 15px var(--hover-color, theme('colors.primary'));
            transform: translateY(-5px);
        }

        /* Custom Cursor */
        @media (min-width: 768px) {
            * {
                cursor: none !important;
            }
            .custom-cursor {
                position: fixed;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: theme('colors.primary');
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: transform 0.15s ease, background-color 0.2s ease;
            }
            .custom-cursor-follower {
                position: fixed;
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.2);
                pointer-events: none;
                z-index: 9998;
                transform: translate(-50%, -50%);
                transition: transform 0.3s ease-out, border-color 0.3s ease, width 0.3s ease, height 0.3s ease;
            }
            
            .custom-cursor.hover {
                transform: translate(-50%, -50%) scale(1.5);
                background-color: theme('colors.secondary');
            }
            .custom-cursor-follower.hover {
                transform: translate(-50%, -50%) scale(1.5);
                border-color: theme('colors.primary');
                background-color: rgba(255, 255, 255, 0.05);
            }
            
            .custom-cursor.clicked {
                transform: translate(-50%, -50%) scale(0.8);
            }
            .custom-cursor-follower.clicked {
                transform: translate(-50%, -50%) scale(0.8);
                background-color: theme('colors.primary');
                opacity: 0.2;
            }
            
            .custom-cursor.hidden, .custom-cursor-follower.hidden {
                opacity: 0;
            }
        }
